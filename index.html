<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dulce Escena Final</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="preloader">
        <div class="loader-content">
            <h1 class="loader-title">Dulce Escena Final</h1>
            <div class="progress-bar">
                <div class="progress-fill"></div>
            </div>
            <p class="loader-status">Cargando recuerdos...</p>
        </div>
    </div>

    <div class="scene-container" style="opacity: 0;">
        <div class="layer sky"></div>
        <div class="layer back"></div>
        <img src="img/atril.webp" class="atril" alt="Atril">
        <img src="img/dulce.webp" class="dulce" alt="Dulce">
        <div class="layer front"></div>
    </div>

    <audio id="musica" src="cancion/sad.mpeg" loop preload="auto"></audio>

    <script src="script.js"></script>

    <!-- Filtro de viento para Dulce -->
    <svg style="position: absolute; width: 0; height: 0;">
        <filter id="windFilter">
            <feTurbulence type="fractalNoise" baseFrequency="0.01 0.05" numOctaves="2" seed="1">
                <animate attributeName="baseFrequency" dur="5s" values="0.01 0.05;0.01 0.1;0.01 0.05" repeatCount="indefinite" />
            </feTurbulence>
            <feDisplacementMap in="SourceGraphic" scale="4" />
        </filter>
    </svg>
</body>
</html>
