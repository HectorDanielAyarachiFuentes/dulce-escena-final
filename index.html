<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Meta tags SEO -->
    <meta name="description" content="Dulce Escena Final - Una experiencia visual animada e inmersiva.">
    <meta name="keywords" content="animación, web, escena, recuerdos, interactivo">
    <meta name="author" content="Héctor Daniel">
    <meta name="theme-color" content="#1a1a2e">
    
    <!-- Open Graph / Redes Sociales -->
    <meta property="og:title" content="Dulce Escena Final">
    <meta property="og:description" content="Una experiencia visual animada e inmersiva con música de fondo.">
    <meta property="og:type" content="website">
    
    <!-- Favicon (SVG / Emoji) -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌅</text></svg>">
    
    <title>Dulce Escena Final</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="preloader">
        <div class="loader-content">
            <h1 class="loader-title">Dulce Escena Final</h1>
            <div class="progress-bar">
                <div class="progress-fill"></div>
            </div>
            <p class="loader-status">Cargando recuerdos...</p>
        </div>
    </div>

    <div class="scene-container" style="opacity: 0;">
        <div class="layer sky"></div>
        <div class="layer clouds"></div>
        <div class="layer back"></div>
        
        <!-- Animated Elements -->
        <div class="sailboat-wrapper sailboat-1"><div class="element sailboat"></div></div>
        <div class="sailboat-wrapper sailboat-2"><div class="element sailboat"></div></div>
        <div class="sailboat-wrapper sailboat-3"><div class="element sailboat"></div></div>
        <div class="sailboat-wrapper sailboat-4"><div class="element sailboat"></div></div>
        <div class="seagull-wrapper seagull-1"><div class="element seagull"></div></div>
        <div class="seagull-wrapper seagull-2"><div class="element seagull"></div></div>
        <div class="seagull-wrapper seagull-3"><div class="element seagull"></div></div>

        <img src="img/atril.webp" class="atril" alt="Atril">
        <img src="img/dulce.webp" class="dulce" alt="Dulce">
        <div class="layer front"></div>
    </div>

    <audio id="musica" src="cancion/sad.mpeg" loop preload="auto"></audio>

    <!-- Botón Control de Música -->
    <button id="musicControl" class="music-control-btn" title="Pausar/Reanudar">
        <svg class="play-icon" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
            <path d="M8 5v14l11-7z"/>
        </svg>
        <svg class="pause-icon" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
            <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
        </svg>
    </button>

    <script src="script.js"></script>

</body>
</html>
