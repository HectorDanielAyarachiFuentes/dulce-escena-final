<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dulce Escena Final</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="preloader">
        <div class="loader-content">
            <h1 class="loader-title">Dulce Escena Final</h1>
            <div class="progress-bar">
                <div class="progress-fill"></div>
            </div>
            <p class="loader-status">Cargando recuerdos...</p>
        </div>
    </div>

    <div class="scene-container" style="opacity: 0;">
        <div class="layer sky"></div>
        <div class="layer back"></div>
        <img src="img/dibujando.webp" class="perro" alt="Perro dibujando">
        <div class="layer front"></div>
    </div>

    <audio id="musica" src="cancion/sad.mpeg" loop preload="auto"></audio>

    <script src="script.js"></script>
</body>
</html>
